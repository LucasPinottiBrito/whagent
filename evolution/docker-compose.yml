services:
  evolution-api:
    image: ${EVOLUTION_API_IMAGE:-evoapicloud/evolution-api:v2.3.7}
    container_name: whatsapp-agent-evolution-api
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      evolution-postgres:
        condition: service_healthy
      evolution-redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - evolution_instances:/evolution/instances

  evolution-postgres:
    image: postgres:15
    container_name: whatsapp-agent-evolution-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DATABASE:-evolution}
      POSTGRES_USER: ${POSTGRES_USERNAME:-evolution}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-evolution_password}
    ports:
      - "5433:5432"
    volumes:
      - evolution_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  evolution-redis:
    image: redis:7
    container_name: whatsapp-agent-evolution-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6380:6379"
    volumes:
      - evolution_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  evolution_instances:
  evolution_postgres_data:
  evolution_redis_data:
