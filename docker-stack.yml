version: "3.8"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-car_agent_db}
      POSTGRES_USER: ${POSTGRES_USER:-car_agent_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-car_agent_password}
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - PinottiNet
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: "0.50"
          memory: 512M

  redis:
    image: redis:7
    volumes:
      - redis_data:/data
    networks:
      - PinottiNet
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: "0.50"
          memory: 256M

  crm-mock:
    image: whagent-crm-mock:latest
    env_file:
      - .env
    networks:
      - PinottiNet
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: "0.50"
          memory: 256M


  migrate:
    image: whagent-backend:latest
    command: ["alembic", "upgrade", "head"]
    env_file:
      - .env
    depends_on:
      - postgres
    networks:
      - PinottiNet
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 10
      resources:
        limits:
          cpus: "0.50"
          memory: 256M

  backend:
    image: whagent-backend:latest
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
      - crm-mock
    networks:
      - PinottiNet
    ports:
      - target: 8000
        published: 8000
        protocol: tcp
        mode: ingress
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 10
      resources:
        limits:
          cpus: "1.00"
          memory: 768M
      labels:
        - traefik.enable=true
        - traefik.docker.network=${TRAEFIK_DOCKER_NETWORK:-PinottiNet}
        - traefik.http.routers.whagent-api.rule=Host(`${API_DOMAIN:-api.dominio}`)
        - traefik.http.routers.whagent-api.entrypoints=${TRAEFIK_ENTRYPOINTS:-websecure}
        - traefik.http.routers.whagent-api.tls=true
        - traefik.http.routers.whagent-api.tls.certresolver=${TRAEFIK_CERTRESOLVER:-letsencryptresolver}
        - traefik.http.routers.whagent-api.service=whagent-api
        - traefik.http.services.whagent-api.loadbalancer.server.port=8000
        - traefik.http.services.whagent-api.loadbalancer.passHostHeader=true

  worker:
    image: whagent-worker:latest
    command: ["python", "-m", "app.main"]
    env_file:
      - .env
    depends_on:
      - backend
      - redis
    networks:
      - PinottiNet
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 10
      resources:
        limits:
          cpus: "1.00"
          memory: 512M

  frontend:
    image: whagent-frontend:latest
    env_file:
      - .env
    depends_on:
      - backend
    networks:
      - PinottiNet
    ports:
      - target: 3000
        published: 3000
        protocol: tcp
        mode: ingress
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 10
      resources:
        limits:
          cpus: "1.00"
          memory: 512M
      labels:
        - traefik.enable=true
        - traefik.docker.network=${TRAEFIK_DOCKER_NETWORK:-PinottiNet}
        - traefik.http.routers.whagent-app.rule=Host(`${APP_DOMAIN:-app.dominio}`)
        - traefik.http.routers.whagent-app.entrypoints=${TRAEFIK_ENTRYPOINTS:-websecure}
        - traefik.http.routers.whagent-app.tls=true
        - traefik.http.routers.whagent-app.tls.certresolver=${TRAEFIK_CERTRESOLVER:-letsencryptresolver}
        - traefik.http.routers.whagent-app.service=whagent-app
        - traefik.http.services.whagent-app.loadbalancer.server.port=3000
        - traefik.http.services.whagent-app.loadbalancer.passHostHeader=true

volumes:
  postgres_data:
  redis_data:

networks:
  PinottiNet:
    external: true
    name: ${TRAEFIK_DOCKER_NETWORK:-PinottiNet}
