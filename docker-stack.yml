version: "3.8"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-car_agent_db}
      POSTGRES_USER: ${POSTGRES_USER:-car_agent_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-car_agent_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - whagent_net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: "0.50"
          memory: 512M

  redis:
    image: redis:7
    volumes:
      - redis_data:/data
    networks:
      - whagent_net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: "0.50"
          memory: 256M

  crm-mock:
    image: whagent-crm-mock:latest
    env_file:
      - .env
    networks:
      - whagent_net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: "0.50"
          memory: 256M

  backend:
    image: whagent-backend:latest
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
      - crm-mock
    networks:
      - whagent_net
    ports:
      - target: 8000
        published: 8000
        protocol: tcp
        mode: ingress
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: "1.00"
          memory: 768M

  worker:
    image: whagent-worker:latest
    command: ["python", "-m", "app.main"]
    env_file:
      - .env
    depends_on:
      - backend
      - redis
    networks:
      - whagent_net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: "1.00"
          memory: 512M

  frontend:
    image: whagent-frontend:latest
    env_file:
      - .env
    depends_on:
      - backend
    networks:
      - whagent_net
    ports:
      - target: 3000
        published: 3000
        protocol: tcp
        mode: ingress
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: "1.00"
          memory: 512M

volumes:
  postgres_data:
  redis_data:

networks:
  whagent_net:
    driver: overlay
