version: "3.8"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-car_agent_db}
      POSTGRES_USER: ${POSTGRES_USER:-car_agent_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-car_agent_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - whagent_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-car_agent_user} -d ${POSTGRES_DB:-car_agent_db}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - whagent_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  crm-mock:
    build:
      context: ./crm-mock
    env_file:
      - .env
    ports:
      - "8001:8001"
    networks:
      - whagent_net


  migrate:
    build:
      context: ./backend
    command: ["alembic", "upgrade", "head"]
    env_file:
      - .env
    depends_on:
      - postgres
    networks:
      - whagent_net
    profiles:
      - tools

  backend:
    build:
      context: ./backend
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
      - crm-mock
    ports:
      - "8000:8000"
    networks:
      - whagent_net

  worker:
    build:
      context: ./workers
    env_file:
      - .env
    depends_on:
      - backend
      - redis
    networks:
      - whagent_net

  frontend:
    build:
      context: ./frontend
    env_file:
      - .env
    depends_on:
      - backend
    ports:
      - "3000:3000"
    networks:
      - whagent_net

volumes:
  postgres_data:
  redis_data:

networks:
  whagent_net:
    driver: bridge
